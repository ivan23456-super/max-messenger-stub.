<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>МАКС</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="LOGO.webp">
    
    <style>
        :root {
            --bg-primary: #1C1C1E;
            --bg-secondary: #2C2C2E;
            --bg-card: #3A3A3C;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent: #007AFF;
            --separator: rgba(255, 255, 255, 0.08);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            padding: 16px;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 100%;
            max-height: 100vh;
            background: var(--bg-primary);
            border-radius: 44px;
            overflow: hidden;
            box-shadow:
                0 0 0 3px #1a1a1c,
                0 0 0 6px #2c2c2e,
                0 0 0 8px #0d0d0f,
                0 20px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .crash-blackout {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 300;
            display: none;
        }
        .crash-blackout.active {
            display: block;
        }

        /* Заголовок */
        .app-header {
            padding: 12px 20px 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .app-header .title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-primary); /* ← белый цвет для иконок */
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        .icon-btn.accent {
            background: var(--accent);
        }
        .icon-btn.accent svg {
            stroke: #FFFFFF;
        }
        .icon-btn:active {
            opacity: 0.7;
        }

        /* Фильтры */
        .segmented-control {
            display: flex;
            gap: 20px;
            padding: 0 20px 12px 20px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--separator);
        }
        .segmented-item {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            padding-bottom: 8px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .segmented-item.active {
            color: var(--text-primary);
            font-weight: 600;
        }
        .segmented-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }
        .badge {
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Список чатов */
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-primary);
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 14px;
            border-bottom: 1px solid var(--separator);
            animation: shimmerPulse 1.6s infinite ease-in-out;
        }
        .chat-item:nth-child(1) { animation-delay: 0s; }
        .chat-item:nth-child(2) { animation-delay: 0.1s; }
        .chat-item:nth-child(3) { animation-delay: 0.2s; }
        .chat-item:nth-child(4) { animation-delay: 0.3s; }
        .chat-item:nth-child(5) { animation-delay: 0.4s; }
        .chat-item:nth-child(6) { animation-delay: 0.5s; }
        .chat-item:nth-child(7) { animation-delay: 0.6s; }

        .avatar-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--bg-card);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .text-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .line {
            height: 14px;
            border-radius: 7px;
            background: var(--bg-card);
            position: relative;
            overflow: hidden;
        }
        .line.short { width: 60%; }
        .line.medium { width: 85%; }
        .line.long { width: 95%; }

        .shimmer-overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.08) 50%,
                    transparent 100%);
            animation: shimmerMove 1.8s infinite;
        }

        @keyframes shimmerMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        @keyframes shimmerPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Ошибка */
        .error-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .error-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .error-icon {
            width: 72px;
            height: 72px;
            background: #2C2C2E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .error-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .error-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 28px;
            max-width: 240px;
        }
        .retry-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: var(--font);
        }
        .retry-btn:active {
            background: #0066cc;
            transform: scale(0.97);
        }

        /* Системный диалог Android (Material) */
        .android-crash-dialog {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .android-crash-dialog.active {
            opacity: 1;
            pointer-events: auto;
        }
        .crash-card {
            background: #FFFFFF;
            width: 320px;
            max-width: 90%;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            color: #212121;
            font-family: 'Roboto', sans-serif;
        }
        .crash-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.3;
        }
        .crash-option {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .crash-option:active {
            background: #f5f5f5;
        }
        .crash-option svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .crash-option span {
            font-size: 16px;
            font-weight: 400;
        }

        /* Нижняя навигация */
        .bottom-nav {
            background: #1C1C1E;
            border-top: 1px solid var(--separator);
            padding: 8px 0 0 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 4px 0 6px 0;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent);
        }
        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
                height: 100vh;
                overflow: hidden;
            }
            .phone-frame {
                border-radius: 0;
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                box-shadow: none;
            }
        }
        @media (max-height: 700px) {
            .chat-item { padding: 8px 20px; }
            .avatar-placeholder { width: 44px; height: 44px; }
            .line { height: 12px; }
            .text-lines { gap: 6px; }
        }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <div class="app-header">
            <div class="title">Чаты</div>
            <div class="header-actions">
                <div class="icon-btn" aria-label="Поиск">
                    <svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
                </div>
                <div class="icon-btn accent" aria-label="Новый чат">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
            </div>
        </div>

        <div class="segmented-control">
            <div class="segmented-item active">Все</div>
            <div class="segmented-item">Новые <span class="badge">2</span></div>
            <div class="segmented-item">Семья</div>
        </div>

        <div class="chat-list-container" id="chatListContainer">
            <div class="chat-list" id="chatList">
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line long"><div class="shimmer-overlay"></div></div><div class="line medium"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line medium"><div class="shimmer-overlay"></div></div><div class="line short"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line long"><div class="shimmer-overlay"></div></div><div class="line short"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line short"><div class="shimmer-overlay"></div></div><div class="line medium"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line long"><div class="shimmer-overlay"></div></div><div class="line short"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line medium"><div class="shimmer-overlay"></div></div><div class="line short"><div class="shimmer-overlay"></div></div></div></div>
                <div class="chat-item"><div class="avatar-placeholder"><div class="shimmer-overlay"></div></div><div class="text-lines"><div class="line long"><div class="shimmer-overlay"></div></div><div class="line medium"><div class="shimmer-overlay"></div></div></div></div>
            </div>

            <div class="error-overlay" id="errorOverlay">
                <div class="error-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" stroke="#8E8E93" fill="none">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="13"/>
                        <circle cx="12" cy="16" r="1" fill="#8E8E93" stroke="none"/>
                    </svg>
                </div>
                <div class="error-title">Не удаётся связаться с сервером</div>
                <div class="error-subtitle">Проверьте подключение к интернету или попробуйте позже.</div>
                <button class="retry-btn" id="retryBtn">Попробовать снова</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item">
                <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><circle cx="17" cy="9" r="3"/><path d="M23 21v-2a4 4 0 00-3-3.87"/></svg></div>
                <span>Контакты</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 018.63 18.85 19.5 19.5 0 012.81 13.03 19.79 19.79 0 01.29 4.18 2 2 0 012.11 2h3a2 2 0 012 1.72c.127.96.36 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.34 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
                <span>Звонки</span>
            </div>
            <div class="nav-item active">
                <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/></svg></div>
                <span>Чаты</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
                <span>Настройки</span>
            </div>
        </div>
    </div>

    <!-- Системный диалог Android -->
    <div class="android-crash-dialog" id="crashDialog">
        <div class="crash-card">
            <div class="crash-title">Приложение "МАКС"<br>не отвечает</div>
            <div class="crash-option" id="closeAppOption">
                <svg viewBox="0 0 24 24" fill="none" stroke="#009688" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
                <span>Закрыть приложение</span>
            </div>
            <div class="crash-option" id="waitOption">
                <svg viewBox="0 0 24 24" fill="none" stroke="#009688" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Подождать</span>
            </div>
        </div>
    </div>

    <!-- Чёрный экран краша -->
    <div class="crash-blackout" id="crashBlackout"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => {});
            });
        }

        (function() {
            const chatList = document.getElementById('chatList');
            const errorOverlay = document.getElementById('errorOverlay');
            const retryBtn = document.getElementById('retryBtn');
            const crashDialog = document.getElementById('crashDialog');
            const crashBlackout = document.getElementById('crashBlackout');
            const closeAppOption = document.getElementById('closeAppOption');
            const waitOption = document.getElementById('waitOption');

            let retryCount = 0;
            let errorTimer = setTimeout(showError, 10000);
            let isErrorShown = false;
            let crashTimer = null;

            function showError() {
                if (isErrorShown) return;
                isErrorShown = true;
                if (chatList) chatList.style.display = 'none';
                if (errorOverlay) errorOverlay.classList.add('active');
            }

            function resetToLoading() {
                if (errorOverlay) errorOverlay.classList.remove('active');
                if (chatList) chatList.style.display = 'flex';
                isErrorShown = false;
                clearTimeout(errorTimer);
                errorTimer = setTimeout(showError, 10000);
                clearTimeout(crashTimer);
                crashDialog.classList.remove('active');
            }

            // Три нажатия → через 5 секунд системный диалог
            if (retryBtn) {
                retryBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (retryCount >= 2) {
                        if (errorOverlay) errorOverlay.classList.remove('active');
                        if (chatList) chatList.style.display = 'none';
                        isErrorShown = true;
                        crashTimer = setTimeout(() => {
                            crashDialog.classList.add('active');
                        }, 5000);
                    } else {
                        retryCount++;
                        resetToLoading();
                    }
                });
            }

            // Подождать – просто «залипает», ничего не делает
            if (waitOption) {
                waitOption.addEventListener('click', function(e) {
                    e.preventDefault();
                });
            }

            // Закрыть приложение – рывок в черноту после короткого зависания
            if (closeAppOption) {
                closeAppOption.addEventListener('click', function(e) {
                    e.preventDefault();
                    // Замораживаем интерфейс на 1.5 секунды
                    document.body.style.pointerEvents = 'none';
                    setTimeout(() => {
                        // Скрываем диалог и мгновенно включаем чёрный экран
                        crashDialog.classList.remove('active');
                        crashBlackout.classList.add('active');
                    }, 1500);
                });
            }

            // Эффект нестабильного FPS у скелетонов
            function lagShimmer() {
                const overlays = document.querySelectorAll('.shimmer-overlay');
                if (overlays.length === 0) return;
                const randomIndex = Math.floor(Math.random() * overlays.length);
                const target = overlays[randomIndex];
                target.style.animationPlayState = 'paused';
                setTimeout(() => {
                    target.style.animationPlayState = 'running';
                }, 80 + Math.random() * 200);
            }
            setInterval(lagShimmer, 1800 + Math.random() * 2200);
        })();
    </script>
</body>
</html>
